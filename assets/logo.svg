<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- White Circle Background -->
  <circle cx="250" cy="250" r="240" fill="#ffffff" />
  
  <!-- Geometric Line Art Group -->
  <g fill="none" stroke="#121212" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- E-Shape Graphic (Left) -->
    <!-- Left vertical stem of E and house -->
    <path d="M 180 280 L 180 200" />
    <!-- Three horizontal bars of E -->
    <path d="M 180 280 L 235 280" />
    <path d="M 180 250 L 215 250" />
    <path d="M 180 220 L 235 220" />
    
    <!-- Left House Roof (Diagonal up-right) -->
    <path d="M 180 200 L 250 150" />
    
    <!-- Middle Tall Building -->
    <!-- Left wall (starts from left house roof) -->
    <path d="M 250 150 L 250 90" />
    <!-- Pitched roof (up-right to peak, down-right) -->
    <path d="M 250 90 L 282 60" />
    <path d="M 282 60 L 314 90" />
    <!-- Right wall -->
    <path d="M 314 90 L 314 280" />
    
    <!-- Right Narrow Column -->
    <!-- Left wall -->
    <path d="M 324 140 L 324 280" />
    <!-- Diagonal roof (up-right) -->
    <path d="M 324 140 L 346 110" />
    <!-- Right wall -->
    <path d="M 346 110 L 346 280" />
  </g>
  
  <!-- Typography Group (Black Text matching logo font) -->
  <g fill="#121212" text-anchor="middle" font-family="'Montserrat', 'Inter', -apple-system, sans-serif">
    <!-- E BUILD RENOVATION -->
    <text x="250" y="325" font-size="25" font-weight="800" letter-spacing="0.5">E BUILD RENOVATION</text>
    
    <!-- & CONSTRUCTION -->
    <text x="250" y="353" font-size="20" font-weight="700" letter-spacing="1">&amp; CONSTRUCTION</text>
    
    <!-- Chinese Name (室内设计和装修) -->
    <text x="250" y="385" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" letter-spacing="4">室内设计和装修</text>
    
    <!-- Registration Number -->
    <text x="250" y="410" font-size="11" font-weight="600" letter-spacing="0.5">202203280569 (SA0589318-W)</text>
  </g>
</svg>
